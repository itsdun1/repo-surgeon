name: Agent Evals

on:
  pull_request:
    paths:
      - 'agent.yaml'
      - 'SOUL.md'
      - 'RULES.md'
      - 'skills/**'
      - 'tools/**'
      - 'hooks/**'
      - 'workflows/**'
      - 'evals/**'
  push:
    branches: [main]
    paths:
      - 'agent.yaml'
      - 'SOUL.md'
      - 'RULES.md'
      - 'skills/**'
      - 'tools/**'
      - 'hooks/**'
      - 'workflows/**'

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install gitagent CLI
        run: |
          bash <(curl -fsSL "https://raw.githubusercontent.com/open-gitagent/gitagent/main/install.sh") || echo "gitagent install failed (continuing without)"
      - name: Install Python deps
        run: pip install pyyaml
      - name: Run evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd evals
          python run_evals.py --config eval.yaml --agent-dir ..
      - name: Score results
        run: |
          cd evals/reports/$(ls -t reports | head -1)
          python ../../score.py --results results.json --out summary.json
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: evals/reports/
