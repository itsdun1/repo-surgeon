name: issue-to-pr
description: >
  Issue labeled `surgeon:fix` or `surgeon:feature` triggers this workflow.
  Classifies, implements (with optional security review), tests, opens a PR,
  comments back on the issue, updates memory.
version: 1.0.0

inputs:
  - name: target_repo
    type: string
    required: true
    description: "owner/repo"
  - name: issue_number
    type: integer
    required: true
  - name: github_pat
    type: string
    required: true
    secret: true
    description: "Installation token for the target repo"

outputs:
  - name: pr_url
    description: "URL of the PR opened on the target repo"
  - name: classification
    description: "bug | feature | refactor | wont-fix | needs-clarification"
  - name: aborted
    description: "Reason the workflow aborted, if any"

steps:
  - id: load_context
    action: skill
    skill: load-repo-context
    inputs:
      target_repo: ${{ inputs.target_repo }}

  - id: fetch_issue
    action: tool
    tool: read-issue
    inputs:
      repo: ${{ inputs.target_repo }}
      issue_number: ${{ inputs.issue_number }}
      include_comments: true
    depends_on: [load_context]

  - id: classify
    action: skill
    skill: classify-issue
    inputs:
      issue: ${{ steps.fetch_issue.outputs }}
    depends_on: [fetch_issue]

  - id: early_exit_wontfix
    action: control
    conditions:
      - if: "${{ steps.classify.outputs.kind == 'wont-fix' || steps.classify.outputs.kind == 'needs-clarification' }}"
    then:
      - action: tool
        tool: github-api
        inputs:
          action: comment
          repo: ${{ inputs.target_repo }}
          issue_number: ${{ inputs.issue_number }}
          comment_body: ${{ steps.classify.outputs.comment_to_post }}
      - terminate:
          aborted: "${{ steps.classify.outputs.kind }} — see issue comment"
    depends_on: [classify]

  - id: clone
    action: tool
    tool: cli
    inputs:
      command: |
        rm -rf ${{ env.TARGET_DIR }}
        mkdir -p ${{ env.TARGET_DIR }}
        git clone --depth=50 https://x-access-token:${{ inputs.github_pat }}@github.com/${{ inputs.target_repo }}.git ${{ env.TARGET_DIR }}
        cd ${{ env.TARGET_DIR }}
        git config user.email "repo-surgeon[bot]@users.noreply.github.com"
        git config user.name "repo-surgeon[bot]"
        git checkout -b surgeon/${{ session.id }}
    depends_on: [classify]

  - id: detect_conv
    action: tool
    tool: detect-conventions
    inputs:
      working_dir: ${{ env.TARGET_DIR }}
      repo_name: ${{ inputs.target_repo }}
    depends_on: [clone]

  - id: implement_fix
    action: skill
    skill: fix-from-issue
    inputs:
      issue: ${{ steps.fetch_issue.outputs }}
      working_dir: ${{ env.TARGET_DIR }}
    conditions:
      - if: "${{ steps.classify.outputs.kind == 'bug' }}"
    depends_on: [detect_conv]

  - id: implement_feature
    action: skill
    skill: implement-feature
    inputs:
      issue: ${{ steps.fetch_issue.outputs }}
      working_dir: ${{ env.TARGET_DIR }}
    conditions:
      - if: "${{ steps.classify.outputs.kind == 'feature' }}"
    depends_on: [detect_conv]

  - id: implement_refactor
    action: skill
    skill: propose-refactor
    inputs:
      candidates: []
      working_dir: ${{ env.TARGET_DIR }}
    conditions:
      - if: "${{ steps.classify.outputs.kind == 'refactor' }}"
    depends_on: [detect_conv]

  - id: security_review
    action: agent
    agent: security-reviewer
    inputs:
      working_dir: ${{ env.TARGET_DIR }}
      diff_summary: "${{ steps.implement_fix.outputs.diff_summary || steps.implement_feature.outputs.approach_summary }}"
    conditions:
      - if: "${{ steps.implement_fix.outputs.security_sensitive == true || steps.implement_feature.outputs.security_sensitive == true }}"
    depends_on: [implement_fix, implement_feature]

  - id: tests
    action: skill
    skill: run-tests-validate
    inputs:
      working_dir: ${{ env.TARGET_DIR }}
      scope: all
    retry:
      max_attempts: 2
      on: flake
    depends_on: [implement_fix, implement_feature, implement_refactor, security_review]

  - id: abort_on_test_failure
    action: control
    conditions:
      - if: "${{ steps.tests.outputs.tests_can_run == false || steps.tests.outputs.failed > 0 }}"
    then:
      - action: tool
        tool: github-api
        inputs:
          action: comment
          repo: ${{ inputs.target_repo }}
          issue_number: ${{ inputs.issue_number }}
          comment_body: |
            I was unable to open a PR for this issue. Tests did not pass after my proposed change.

            **Test runner**: ${{ steps.tests.outputs.runner }}
            **Failed**: ${{ steps.tests.outputs.failed }}
            **First failure**: ${{ steps.tests.outputs.failures[0].error }}

            Aborting per RULE 13 (do not open PRs with broken tests).
      - terminate:
          aborted: "test failure or runner unavailable"
    depends_on: [tests]

  - id: feature_approval
    action: __approval_gate__
    conditions:
      - if: "${{ steps.classify.outputs.kind == 'feature' }}"
    compliance:
      approval_gate: true
      approval_channel: slack
      approval_message: "Feature draft for issue #${{ inputs.issue_number }} ready for review. Approve to open PR?"
      timeout_minutes: 1440
    depends_on: [tests]

  - id: open_pr
    action: skill
    skill: open-pr
    inputs:
      repo: ${{ inputs.target_repo }}
      branch: "surgeon/${{ session.id }}"
      base: ${{ steps.detect_conv.outputs.default_branch || 'main' }}
      title: "[surgeon:${{ steps.classify.outputs.kind }}] ${{ steps.fetch_issue.outputs.title }}"
      labels: ["surgeon:${{ steps.classify.outputs.kind }}", "needs-review"]
      issue_number: ${{ inputs.issue_number }}
    depends_on: [feature_approval]

  - id: comment_back
    action: tool
    tool: github-api
    inputs:
      action: comment
      repo: ${{ inputs.target_repo }}
      issue_number: ${{ inputs.issue_number }}
      comment_body: |
        Opened ${{ steps.open_pr.outputs.pr_url }} for review.

        Memory updates from this session will be visible in the agent repo's history.
    depends_on: [open_pr]

  - id: update_memory
    action: skill
    skill: update-memory
    inputs:
      target_repo: ${{ inputs.target_repo }}
      session_outcome: pr_opened
      pr_url: ${{ steps.open_pr.outputs.pr_url }}
      issue_number: ${{ inputs.issue_number }}
    depends_on: [comment_back]

error_handling:
  on_step_failure: escalate
  escalate_to:
    action: tool
    tool: github-api
    inputs:
      action: comment
      repo: ${{ inputs.target_repo }}
      issue_number: ${{ inputs.issue_number }}
      comment_body: "I encountered an error processing this issue and will not open a PR. Please ping a human."
