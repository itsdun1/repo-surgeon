id: classify-bug-vs-feature-01
mode: classify-issue
target_repo: eval-target
issue:
  title: "Cart total is wrong when items have decimal prices"
  body: |
    When the cart contains items with decimal prices (e.g., 3.99 + 1.50),
    the displayed total shows 5.4 instead of 5.49.

    Steps to reproduce:
    1. Add an item priced 3.99
    2. Add an item priced 1.50
    3. Check the cart total in the UI

    Expected: 5.49
    Actual: 5.4
  labels: ["bug", "surgeon:fix"]
assertions:
  - kind: classification_matches
    expected_kind: "bug"
    expected_scope: "S"
budget:
  max_cost_usd: 0.10
  max_duration_s: 60
